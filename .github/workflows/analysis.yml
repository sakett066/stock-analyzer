name: Stock Analysis

on:
  schedule:
    # 9:30 AM IST = 4:00 AM UTC (Mon-Fri)
    - cron: '0 4 * * 1-5'
    # 12:00 PM IST = 6:30 AM UTC (Mon-Fri)  
    - cron: '30 6 * * 1-5'
    # 2:00 PM IST = 8:30 AM UTC (Mon-Fri)
    - cron: '30 8 * * 1-5'
    # 3:15 PM IST = 9:45 AM UTC (Mon-Fri)
    - cron: '45 9 * * 1-5'
  
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nsetools requests
    
    - name: Fix Timezone & Run Analysis
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TZ: 'Asia/Kolkata'
      run: |
        # Set timezone to India
        export TZ='Asia/Kolkata'
        date
        python analysis.py
