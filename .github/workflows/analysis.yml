name: Stock Analysis

on:
  schedule:
    # 9:25 AM IST → 8 hours early = 1:25 AM UTC previous day
    - cron: '25 1 * * 0-4'
    # 12:00 PM IST → 8 hours early = 4:00 AM UTC
    - cron: '0 4 * * 0-4'
    # 2:00 PM IST → 8 hours early = 6:00 AM UTC
    - cron: '0 6 * * 0-4'
    # 3:15 PM IST → 8 hours early = 7:15 AM UTC
    - cron: '15 7 * * 0-4'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install packages
        run: pip install nsetools requests
      - name: Run analysis
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: Asia/Kolkata
        run: python analysis.py
