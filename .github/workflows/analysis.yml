name: Stock Analysis

on:
  schedule:
    # 9:30 AM IST → Schedule 5 hours early
    - cron: '30 22 * * 0-4'
    # 12:00 PM IST → Schedule 5 hours early
    - cron: '0 1 * * 1-5'
    # 2:00 PM IST → Schedule 5 hours early
    - cron: '0 3 * * 1-5'
    # 3:15 PM IST → Schedule 5 hours early
    - cron: '15 4 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install packages
        run: pip install nsetools requests
      - name: Run analysis
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: Asia/Kolkata
        run: python analysis.py
