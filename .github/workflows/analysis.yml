name: Stock Market Analyzer

on:
  schedule:
    # 9:30 AM IST (4:00 UTC) Mon-Fri
    - cron: '0 4 * * 1-5'
    # 12:00 PM IST (6:30 UTC) Mon-Fri
    - cron: '30 6 * * 1-5'
    # 2:00 PM IST (8:30 UTC) Mon-Fri
    - cron: '30 8 * * 1-5'
    # 3:15 PM IST (9:45 UTC) Mon-Fri
    - cron: '45 9 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install packages
      run: |
        pip install nsetools requests
    - name: Run analysis
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python analysis.py
