name: Stock Analysis

on:
  schedule:
    # Morning 9:25 AM - Avg delay 3h 42m → Schedule 5:43 UTC
    - cron: '43 5 * * 0-4'
    # Midday 12:00 PM - Avg delay 2h 27m → Schedule 3:33 UTC
    - cron: '33 3 * * 1-5'
    # Afternoon 2:00 PM - Avg delay 1h 20m → Schedule 6:40 UTC
    - cron: '40 6 * * 1-5'
    # Closing 3:15 PM - Avg delay 35m → Schedule 8:40 UTC
    - cron: '40 8 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install packages
        run: pip install nsetools requests
      - name: Run analysis
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: Asia/Kolkata
        run: python analysis.py
